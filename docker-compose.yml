version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cricket_postgres
    environment:
      POSTGRES_DB: cricket_eda
      POSTGRES_USER: cricket
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cricket -d cricket_eda"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: cricket_backend
    environment:
      DATABASE_URL: postgresql://cricket:changeme@postgres:5432/cricket_eda
      DUCKDB_PATH: /app/data/duckdb/cricket.duckdb
      DATA_RAW_DIR: /app/data/raw
      DATA_PROCESSED_DIR: /app/data/processed
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: cricket_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
